workflows:
  ios-python-app:
    name: iOS Python App Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      python: 3.10
    scripts:
      - name: Install Dependencies
        script: |
          pip install flet aiohttp
      - name: Build IPA
        script: |
          flet build ios --no-sign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/app/*.app
