workflows:
  ios-python-app:
    name: SurgeSocietyDDOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          pip install flet aiohttp
      - name: Build IPA
        script: |
          flet build ipa
    artifacts:
      - build/ios/ipa/*.ipa
