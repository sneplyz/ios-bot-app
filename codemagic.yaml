workflows:
  ios-python-app:
    name: iOS Python App Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install Python and Flet
        script: |
          pip install flet aiohttp
      - name: Build IPA
        script: |
          flet build ios --no-sign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/app/*.app
