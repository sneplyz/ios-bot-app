workflows:
  ios-python-app:
    name: ddosbysurgesociety
    max_build_duration: 60
    instance_type: mac_mini_m1
   scripts:
      - name: Install Python and Flet
        script: |
          pip install flet aiohttp
      - name: Build Project
        script: |
          flet build ipa
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/app/*.app
