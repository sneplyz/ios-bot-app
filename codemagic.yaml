workflows:
  ios-python-app:
    name: SurgeSocietyDDOS
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          pip install flet aiohttp
      - name: Build For Simulator
        script: |
          flet build ios-simulator
          # Упаковываем в ZIP, чтобы Codemagic точно увидел это как файл
          cd build/ios/iphonesimulator
          zip -r ../../../my_app.zip *.app
    artifacts:
      - "*.zip"
